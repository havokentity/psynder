name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.preset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            runner: macos-14
            preset: mac-release
          - os: macos-14
            runner: macos-14
            preset: mac-debug
          - os: ubuntu-24.04
            runner: ubuntu-24.04
            preset: linux-release
          - os: ubuntu-24.04
            runner: ubuntu-24.04
            preset: linux-asan-debug
          - os: windows-2022
            runner: windows-2022
            preset: win-release

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install Ninja (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install ninja
          else
            sudo apt-get update
            sudo apt-get install -y ninja-build libwayland-dev wayland-protocols \
              libxkbcommon-dev libpipewire-0.3-dev libasound2-dev libxrandr-dev \
              libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxext-dev \
              libxfixes-dev libdrm-dev libgbm-dev \
              xvfb
          fi

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # The sample + golden tests open a real window. GitHub's Linux runners
      # are headless (no X11/Wayland display), so they need a virtual X server
      # — xvfb-run gives one and the engine's X11 fallback path renders into
      # it. macOS runners ship a WindowServer and Windows has a desktop, so
      # those run ctest directly. linux-asan-debug has no test preset (it's a
      # build-only sanitizer gate). The test presets carry repeat:until-pass:2
      # so the flaky IPC port-acquisition test (#75) survives a single race
      # while a genuine failure still fails twice and gates.
      - name: Test (Linux, headless via Xvfb)
        if: runner.os == 'Linux' && matrix.preset != 'linux-asan-debug'
        run: xvfb-run -a ctest --preset ${{ matrix.preset }}

      - name: Test (Mac / Windows)
        if: runner.os != 'Linux'
        run: ctest --preset ${{ matrix.preset }}

      # Collect the shippable binaries (samples + lm_* tools) so every push
      # to main / every PR has downloadable artifacts for ~14 days. Release
      # builds only — debug/asan binaries aren't useful to download.
      - name: Upload binaries
        if: matrix.preset == 'mac-release' || matrix.preset == 'linux-release' || matrix.preset == 'win-release'
        uses: actions/upload-artifact@v4
        with:
          name: psynder-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/bin/sample_0*
            build/${{ matrix.preset }}/bin/lm_pak*
            build/${{ matrix.preset }}/bin/lm_cook*
            build/${{ matrix.preset }}/bin/lm_qbsp*
            build/${{ matrix.preset }}/bin/lm_bake*
            build/${{ matrix.preset }}/bin/lm_mapimport*
          if-no-files-found: error
          retention-days: 14

  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format / clang-tidy 17
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17 clang-tidy-17
          sudo ln -sf $(which clang-format-17) /usr/local/bin/clang-format
          sudo ln -sf $(which clang-tidy-17) /usr/local/bin/clang-tidy

      - name: clang-format check
        # Gating: PR #117's one-time clang-format-17 sweep cleared the backlog,
        # so this goes red only on NEW formatting drift. SortIncludes is off in
        # .clang-format (order-dependent platform includes), so this enforces
        # layout only, never include order.
        run: |
          find engine tools samples tests -type f \( -name '*.h' -o -name '*.cpp' -o -name '*.c' \) \
            -not -path '*/third_party/*' \
            -print0 | xargs -0 clang-format --dry-run --Werror

      # clang-tidy gating is opt-in until the codebase is large enough to be worth it
